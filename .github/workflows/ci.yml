name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ./website/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run validate:build

  lint-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --timeout 30
            --max-retries 3
            --retry-wait-time 5
            --exclude 'https://shields.io'
            --exclude 'https://camo.githubusercontent.com'
            --exclude '^/'
            --exclude 'https://literacy-for-kids.github.io'
            './README.md'
            './website/docs/**/*.md'
          fail: true
